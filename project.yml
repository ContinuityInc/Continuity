name: Continuity
options:
  bundleIdPrefix: com.continuity
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ContinuityCore:
    path: Packages/ContinuityCore
  ContinuityKit:
    path: Packages/ContinuityKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "KP832RV67A"
    CODE_SIGN_STYLE: Automatic

targets:
  Continuity:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Continuity
    dependencies:
      - package: ContinuityCore
      - package: ContinuityKit
        product: Domain
      - package: ContinuityKit
        product: Ingest
      - package: ContinuityKit
        product: Playback
      - target: ContinuityShare
    # App group shared with the extension — the share-sheet → app handoff channel.
    entitlements:
      path: App/Continuity/Continuity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sanylax.continuity
    info:
      path: App/Continuity/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        # Keep in sync with settings.base MARKETING_VERSION / CURRENT_PROJECT_VERSION —
        # hard-coded 1.0 here drifted from project.yml's 0.1.0.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # audio only — "processing"/"fetch" need BGTaskSchedulerPermittedIdentifiers and we
        # don't schedule BGTasks. Enabling them in Xcode Capabilities breaks TestFlight upload.
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # continuity://import?url=<encoded link> — deep-link entry into the import flow.
        CFBundleURLTypes:
          - CFBundleURLName: com.sanylax.continuity
            CFBundleURLSchemes:
              - continuity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanylax.continuity
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    # onnxruntime SPM xcframework omits MinimumOSVersion → ITMS-90530/90360 on upload.
    # Patch Info.plist then re-sign — editing the plist after Embed Frameworks invalidates the
    # vendor signature (device install fails with 0xe8008001). See microsoft/onnxruntime#27396.
    postBuildScripts:
      - name: Patch onnxruntime MinimumOSVersion
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          FRAMEWORKS_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          # Prefer the expanded identity Xcode used for this build; fall back to ad-hoc for
          # unsigned CI builds (CODE_SIGNING_ALLOWED=NO).
          SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
          if [ -z "$SIGN_IDENTITY" ] || [ "$SIGN_IDENTITY" = "-" ]; then
            SIGN_IDENTITY="-"
          fi
          for framework in onnxruntime onnxruntime_extensions; do
            FRAMEWORK="${FRAMEWORKS_PATH}/${framework}.framework"
            PLIST="${FRAMEWORK}/Info.plist"
            if [ -f "$PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$PLIST" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST"
              /usr/bin/codesign --force --sign "$SIGN_IDENTITY" --timestamp=none --preserve-metadata=identifier,entitlements,flags --generate-entitlement-der "$FRAMEWORK"
              echo "Patched+resigned MinimumOSVersion=${IPHONEOS_DEPLOYMENT_TARGET} in ${framework}.framework"
            fi
          done

  # Share-sheet entry point: stashes the shared URL in the app group for the app to import.
  ContinuityShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/ShareExtension
    dependencies:
      # Same YouTube/Spotify classifiers the app uses — keeps "Added to Continuity" honest.
      - package: ContinuityCore
    entitlements:
      path: App/ShareExtension/ContinuityShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sanylax.continuity
    info:
      path: App/ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Activate when any attachment is a URL — dictionary rules that only declare
            # WebURL miss Spotify/YouTube shares that also attach image/text. Runtime still
            # rejects non-music links via ContinuityCore before showing success.
            NSExtensionActivationRule: 'SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.url" OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.plain-text").@count >= 1).@count >= 1'
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanylax.continuity.share
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
