name: Continuity
options:
  bundleIdPrefix: com.continuity
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ContinuityCore:
    path: Packages/ContinuityCore
  ContinuityKit:
    path: Packages/ContinuityKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "KP832RV67A"
    CODE_SIGN_STYLE: Automatic

targets:
  Continuity:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Continuity
    dependencies:
      - package: ContinuityCore
      - package: ContinuityKit
        product: Domain
      - package: ContinuityKit
        product: Ingest
      - package: ContinuityKit
        product: Playback
    # App group shared with the extension — the share-sheet → app handoff channel.
    entitlements:
      path: App/Continuity/Continuity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sanylax.continuity
    info:
      path: App/Continuity/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        # Keep in sync with settings.base MARKETING_VERSION / CURRENT_PROJECT_VERSION —
        # hard-coded 1.0 here drifted from project.yml's 0.1.0.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # audio only — "processing"/"fetch" need BGTaskSchedulerPermittedIdentifiers and we
        # don't schedule BGTasks. Enabling them in Xcode Capabilities breaks TestFlight upload.
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # No CFBundleURLTypes on this branch — remote import is disabled, so the
        # continuity:// deep-link scheme would be a dead entry point (App Review 2.1).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanylax.continuity
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    # onnxruntime SPM xcframework omits MinimumOSVersion → ITMS-90530/90360 on upload.
    # Patch after Embed Frameworks (postBuildScripts runs last). See microsoft/onnxruntime#27396.
    postBuildScripts:
      - name: Patch onnxruntime MinimumOSVersion
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          FRAMEWORKS_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          for framework in onnxruntime onnxruntime_extensions; do
            PLIST="${FRAMEWORKS_PATH}/${framework}.framework/Info.plist"
            if [ -f "$PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$PLIST" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$PLIST"
              echo "Patched MinimumOSVersion=${IPHONEOS_DEPLOYMENT_TARGET} in ${framework}.framework"
            fi
          done

  # The ContinuityShare share extension is NOT built on this branch: with remote import
  # disabled it could only ever say "Import not available", and App Review rejects
  # nonfunctional features (Guideline 2.1). The sources stay in App/ShareExtension so
  # merges from main are clean; `main`'s project.yml still builds the target.
