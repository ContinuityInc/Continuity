name: Continuity
options:
  bundleIdPrefix: com.continuity
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ContinuityCore:
    path: Packages/ContinuityCore
  ContinuityKit:
    path: Packages/ContinuityKit
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    branch: main   # TODO: pin to a tagged version once verified building
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    exactVersion: "1.20.0"   # ONNX Runtime (Obj-C bindings + xcframework, incl. CoreML EP) for M4 stem separation

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Continuity:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Continuity
    dependencies:
      - package: ContinuityCore
      - package: ContinuityKit
        product: Domain
      - package: ContinuityKit
        product: Playback
      - package: YouTubeKit
      - package: onnxruntime
        product: onnxruntime
    info:
      path: App/Continuity/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.continuity.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
