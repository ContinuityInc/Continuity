name: Continuity
options:
  bundleIdPrefix: com.continuity
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ContinuityCore:
    path: Packages/ContinuityCore
  ContinuityKit:
    path: Packages/ContinuityKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "KP832RV67A"
    CODE_SIGN_STYLE: Automatic

targets:
  Continuity:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Continuity
    dependencies:
      - package: ContinuityCore
      - package: ContinuityKit
        product: Domain
      - package: ContinuityKit
        product: Ingest
      - package: ContinuityKit
        product: Playback
      - target: ContinuityShare
    # App group shared with the extension — the share-sheet → app handoff channel.
    entitlements:
      path: App/Continuity/Continuity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sanylax.continuity
    info:
      path: App/Continuity/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        # Keep in sync with settings.base MARKETING_VERSION / CURRENT_PROJECT_VERSION —
        # hard-coded 1.0 here drifted from project.yml's 0.1.0.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # audio only — "processing"/"fetch" need BGTaskSchedulerPermittedIdentifiers and we
        # don't schedule BGTasks. Enabling them in Xcode Capabilities breaks TestFlight upload.
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # continuity://import?url=<encoded link> — deep-link entry into the import flow.
        CFBundleURLTypes:
          - CFBundleURLName: com.sanylax.continuity
            CFBundleURLSchemes:
              - continuity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanylax.continuity
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    # onnxruntime SPM ships a *static* .framework (Mach-O archive, not a dylib). Xcode still
    # copies a broken ~50 KB stub into Continuity.app/Frameworks. That stub:
    #   - fails code-sign / ITMS MinimumOSVersion checks (microsoft/onnxruntime#27396)
    #   - is useless at runtime — ORT is already statically linked into the app binary
    # Remove the embed entirely. Do NOT patch+resign the stub (that papered over ITMS while
    # leaving a poison Frameworks entry). See also RunAnywhere issue on static-framework embeds.
    postBuildScripts:
      - name: Remove embedded static onnxruntime
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          FRAMEWORKS_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          for framework in onnxruntime onnxruntime_extensions; do
            FRAMEWORK="${FRAMEWORKS_PATH}/${framework}.framework"
            if [ -d "$FRAMEWORK" ]; then
              rm -rf "$FRAMEWORK"
              echo "Removed embedded static ${framework}.framework (linked into app binary)"
            fi
          done
          # Leave an empty Frameworks dir alone — other embeds (none today) may appear later.

  # Share-sheet entry point: stashes the shared URL in the app group for the app to import.
  ContinuityShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/ShareExtension
    dependencies:
      # Same YouTube/Spotify classifiers the app uses — keeps "Added to Continuity" honest.
      - package: ContinuityCore
    entitlements:
      path: App/ShareExtension/ContinuityShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sanylax.continuity
    info:
      path: App/ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Continuity
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Activate when any attachment is a URL — dictionary rules that only declare
            # WebURL miss Spotify/YouTube shares that also attach image/text. Runtime still
            # rejects non-music links via ContinuityCore before showing success.
            NSExtensionActivationRule: 'SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.url" OR ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.plain-text").@count >= 1).@count >= 1'
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanylax.continuity.share
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
